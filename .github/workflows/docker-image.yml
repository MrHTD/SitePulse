name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 1. Log in to Docker Hub using your GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build the image and push it to your Docker Hub repository
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          # This pushes the image to Docker Hub
          push: true
          # Tags it with your Docker Hub username and the app name
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:${{ github.sha }}
          # Keeps the GitHub Actions cache to speed up future builds
          cache-from: type=gha
          cache-to: type=gha,mode=max